; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32ota

[common]
hostname    = esp32_23
fqdn        = ${common.hostname}.fritz.box
platform    = espressif32 @ 6.13.0
board       = esp32cam
framework   = arduino
platform_packages =
board_build.f_cpu = 240000000L
board_build.partitions = min_spiffs.csv
build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DCONFIG_SPIRAM_CACHE_WORKAROUND
    -DHOSTNAME=\"${common.hostname}\"
    -DIS_ESP32CAM
    -DNET_WATCHDOG=\"192.168.1.1\"
lib_deps =
    bblanchon/ArduinoJson@^6.17.2
    # WebSockets
    549@^2.2.1
    # NeoPixelBus for WS2812 RGB
    Makuna/NeoPixelBus @ ^2.8.0
extra_scripts = 
	pre:../prj_template/tools/generate_version.py


[env:esp32ota]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
platform_packages = ${common.platform_packages}
build_flags = ${common.build_flags}
extra_scripts = ${common.extra_scripts}
lib_deps = ${common.lib_deps}
board_build.f_cpu = ${common.board_build.f_cpu}
board_build.partitions = ${common.board_build.partitions}
upload_protocol = espota
upload_port = ${common.fqdn}
upload_flags =
    --port=3232
    --host_port=56789

[env:esp32usb]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
platform_packages = ${common.platform_packages}
build_flags = ${common.build_flags}
extra_scripts = ${common.extra_scripts}
lib_deps = ${common.lib_deps}
board_build.f_cpu = ${common.board_build.f_cpu}
board_build.partitions = ${common.board_build.partitions}
monitor_speed = 115200
upload_speed = 115200
upload_port = /dev/tty.usbserial-A9M9DV3R
